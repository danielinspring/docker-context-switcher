<svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- macOS template icon: pure black shapes on transparent; the system
       recolours it for the light/dark menu bar via the alpha channel. -->
  <!-- Back context card (outline) -->
  <rect x="7" y="9" width="21" height="15" rx="4.5" stroke="#000000" stroke-width="2.6"/>
  <!-- Front context card (filled = active) -->
  <rect x="16" y="20" width="21" height="15" rx="4.5" fill="#000000"/>
</svg>
