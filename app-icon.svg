<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#122b57"/>
      <stop offset="0.55" stop-color="#0a1226"/>
      <stop offset="1" stop-color="#05070f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.28" cy="0.16" r="0.9">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.45"/>
      <stop offset="0.65" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glassCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="accentCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0.75"/>
    </linearGradient>
  </defs>

  <!-- Squircle body -->
  <rect x="64" y="64" width="896" height="896" rx="204" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="204" fill="url(#glow)"/>
  <rect x="66" y="66" width="892" height="892" rx="202" stroke="#ffffff" stroke-opacity="0.16" stroke-width="4"/>

  <!-- Back glass card (inactive context) -->
  <g>
    <rect x="270" y="250" width="484" height="220" rx="56" fill="url(#glassCard)"/>
    <rect x="273" y="253" width="478" height="214" rx="53" stroke="#ffffff" stroke-opacity="0.35" stroke-width="6"/>
    <circle cx="358" cy="360" r="26" fill="#ffffff" fill-opacity="0.35"/>
    <rect x="416" y="336" width="230" height="20" rx="10" fill="#ffffff" fill-opacity="0.30"/>
    <rect x="416" y="376" width="150" height="16" rx="8" fill="#ffffff" fill-opacity="0.18"/>
  </g>

  <!-- Front glass card (active context) -->
  <g>
    <rect x="270" y="546" width="484" height="220" rx="56" fill="url(#accentCard)"/>
    <rect x="273" y="549" width="478" height="214" rx="53" stroke="#ffffff" stroke-opacity="0.55" stroke-width="6"/>
    <rect x="270" y="546" width="484" height="110" rx="56" fill="#ffffff" fill-opacity="0.16"/>
    <circle cx="358" cy="656" r="26" fill="#34d399"/>
    <rect x="416" y="632" width="230" height="20" rx="10" fill="#ffffff" fill-opacity="0.85"/>
    <rect x="416" y="672" width="150" height="16" rx="8" fill="#ffffff" fill-opacity="0.55"/>
  </g>

  <!-- Swap arrows between the cards -->
  <g stroke="#e0f2fe" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 806 388 h 62 v 120"/>
    <path d="M 838 478 l 30 44 l 30 -44"/>
    <path d="M 218 628 h -62 v -120"/>
    <path d="M 186 538 l -30 -44 l -30 44"/>
  </g>
</svg>
