<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#122b57"/>
      <stop offset="0.55" stop-color="#0a1226"/>
      <stop offset="1" stop-color="#05070f"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="0.26" cy="0.18" r="0.85">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.45"/>
      <stop offset="0.7" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="0.82" cy="0.86" r="0.8">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.42"/>
      <stop offset="0.72" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="whaleBody" x1="512" y1="360" x2="512" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#e8f4ff"/>
      <stop offset="1" stop-color="#b6d8ff"/>
    </linearGradient>
    <radialGradient id="shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#02040a" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#02040a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Squircle body -->
  <rect x="64" y="64" width="896" height="896" rx="204" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="204" fill="url(#glowCyan)"/>
  <rect x="64" y="64" width="896" height="896" rx="204" fill="url(#glowViolet)"/>

  <!-- Soft contact shadow beneath the whale -->
  <ellipse cx="512" cy="712" rx="300" ry="46" fill="url(#shadow)"/>

  <!-- Whale (shares its silhouette with the menu-bar icon) -->
  <g transform="translate(151,282) scale(5.6)">
    <path d="M22,72 C11,70 9,58 17,50 C25,40 40,36 56,36 C77,36 93,40 104,49
             C106,41 106,29 114,24 C113,34 111,40 108,46
             C113,51 117,57 120,63 C110,63 102,61 96,59
             C79,66 58,72 40,73 C32,73 26,73 22,72 Z"
          fill="url(#whaleBody)"
          stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.2"/>
    <!-- glass sheen along the back -->
    <path d="M20,55 C26,44 40,38 56,38 C77,38 92,42 102,50"
          fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="2.4"
          stroke-linecap="round"/>
    <!-- eye -->
    <circle cx="30" cy="54" r="3.6" fill="#0a1226"/>
    <circle cx="31.3" cy="52.7" r="1.1" fill="#ffffff"/>
    <!-- blowhole spout -->
    <g stroke="#67e8f9" stroke-width="4.4" stroke-linecap="round">
      <line x1="44" y1="33" x2="44" y2="18"/>
      <line x1="36" y1="34" x2="31" y2="22"/>
      <line x1="52" y1="34" x2="57" y2="22"/>
    </g>
  </g>

  <!-- Glass edge -->
  <rect x="66" y="66" width="892" height="892" rx="202" stroke="#ffffff" stroke-opacity="0.16" stroke-width="4"/>
</svg>
